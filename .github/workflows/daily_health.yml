name: 8:00 AM Daily Health Analysis

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  analyze-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Hard cap -- prevents hung process draining resources (Rule 08)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase httpx

      - name: Run Health Analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QWEN_ENDPOINT_URL: ${{ secrets.QWEN_ENDPOINT_URL }}
        run: python vllm_deployment/scripts/analyze_health.py
