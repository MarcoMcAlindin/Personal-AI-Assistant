# VibeOS — Automated Daily Health Analysis
# Runs every day at 8:00 AM GMT
# Pulls latest Samsung Watch data from Supabase → sends to Qwen3.5-9B-Instruct → stores analysis

name: Daily Health Analysis

on:
  schedule:
    # 8:00 AM GMT every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger for testing

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  QWEN_ENDPOINT_URL: ${{ secrets.QWEN_ENDPOINT_URL }}
  QWEN_MODEL_NAME: ${{ secrets.QWEN_MODEL_NAME }}

jobs:
  health-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase httpx

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Run health analysis
        run: python vllm_deployment/scripts/analyze_health.py
