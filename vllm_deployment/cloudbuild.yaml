steps:
  # Build the container image (includes model weight download ~18GB)
  # HF_TOKEN passed as substitution at build time -- never stored in source
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--build-arg', 'HF_TOKEN=${_HF_TOKEN}', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/vibeos/vllm-qwen:latest', '.']

  # Push the container image to Artifact Registry
  # Cloud Run deployment is handled by deploy.sh (gcloud run deploy)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/vibeos/vllm-qwen:latest']

substitutions:
  _REGION: europe-west1
  _HF_TOKEN: ''

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/vibeos/vllm-qwen:latest'

timeout: 3600s
